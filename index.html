<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云音·乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0a0e17;
            color: #fff;
            min-height: 100vh;
            padding: 2rem 8rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 2.5rem;
            font-weight: bold;
            color: #a8d1ff;
        }
        .logo svg {
            width: 3rem;
            height: 3rem;
            fill: #a8d1ff;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 0;
        }
        .search-box input {
            width: 30rem;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 2rem 0 0 2rem;
            background-color: #1a1f29;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
        }
        .search-box button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0 2rem 2rem 0;
            background-color: #3b82f6;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .search-box button:hover {
            background-color: #2563eb;
        }
        section {
            margin-bottom: 3rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            font-weight: bold;
        }
        .refresh-btn {
            font-size: 1.2rem;
            color: #a8d1ff;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        .song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .song-card {
            background-color: #1a1f29;
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .song-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 0.8rem;
        }
        .song-name {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist {
            font-size: 0.85rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #121826;
            padding: 1rem 8rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-top: 1px solid #272e3b;
        }
        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 20%;
        }
        .player-cover {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        .control-btn:hover {
            color: #3b82f6;
        }
        .play-btn {
            font-size: 2rem;
        }
        .progress-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .progress-bar input[type="range"] {
            flex: 1;
            height: 6px;
            background: #272e3b;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        .progress-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .volume-bar input[type="range"] {
            width: 100px;
            height: 4px;
            background: #272e3b;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        .volume-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .lyrics-box {
            position: fixed;
            right: 2rem;
            top: 20%;
            width: 300px;
            height: 400px;
            background-color: #121826;
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            border: 1px solid #272e3b;
        }
        .lyrics-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #a8d1ff;
        }
        .lyric-line {
            padding: 0.4rem 0;
            color: #94a3b8;
            transition: all 0.3s;
        }
        .lyric-line.active {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .fav-btn {
            color: #ef4444;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            云音·乐
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索歌曲、歌手...">
            <button id="searchBtn">搜索</button>
        </div>
    </header>

    <section class="recommend-section">
        <div class="section-header">
            <span>🔥 热门推荐</span>
            <span class="refresh-btn" id="refreshBtn">换一批 ↻</span>
        </div>
        <div class="song-list" id="recommendList">加载中...</div>
    </section>

    <section class="search-section">
        <div class="section-header">📄 搜索结果</div>
        <div class="song-list" id="searchResult">未找到相关歌曲</div>
    </section>

    <div class="lyrics-box" id="lyricsBox">
        <div class="lyrics-title">歌词</div>
        <div id="lyricsContent"></div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <img class="player-cover" id="playerCover" src="" alt="">
            <div>
                <div id="playerName">未播放歌曲</div>
                <div id="playerArtist">-</div>
            </div>
            <button class="fav-btn" id="favBtn">♡</button>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="modeBtn">🔁</button>
            <button class="control-btn" id="prevBtn">⏮</button>
            <button class="control-btn play-btn" id="playBtn">▶</button>
            <button class="control-btn" id="nextBtn">⏭</button>
        </div>
        <div class="progress-bar">
            <span id="currentTime">00:00</span>
            <input type="range" id="progressSlider" min="0" max="100" value="0">
            <span id="totalTime">00:00</span>
        </div>
        <div class="volume-bar">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>

    <audio id="audio" preload="auto">

    <script>
        // ========== 配置项（改成你的API地址） ==========
        const API_BASE = 'https://api1.567.one';
        let currentSong = null;
        let currentSongList = [];
        let playMode = 'order'; // order/loop/random
        let favoriteSongs = JSON.parse(localStorage.getItem('favorites') || '[]');

        // DOM 元素
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const modeBtn = document.getElementById('modeBtn');
        const progressSlider = document.getElementById('progressSlider');
        const volumeSlider = document.getElementById('volumeSlider');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const playerCover = document.getElementById('playerCover');
        const playerName = document.getElementById('playerName');
        const playerArtist = document.getElementById('playerArtist');
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const recommendList = document.getElementById('recommendList');
        const searchResult = document.getElementById('searchResult');
        const lyricsContent = document.getElementById('lyricsContent');
        const favBtn = document.getElementById('favBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        // ========== 核心函数 ==========
        // 格式化时间
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // 切换播放模式
        modeBtn.addEventListener('click', () => {
            const modes = ['order', 'loop', 'random'];
            const icons = ['🔁', '🔂', '🔀'];
            const idx = modes.indexOf(playMode);
            const nextIdx = (idx + 1) % modes.length;
            playMode = modes[nextIdx];
            modeBtn.textContent = icons[nextIdx];
        });

        // 收藏/取消收藏
        favBtn.addEventListener('click', () => {
            if (!currentSong) return;
            const idx = favoriteSongs.findIndex(s => s.id === currentSong.id);
            if (idx === -1) {
                favoriteSongs.push(currentSong);
                favBtn.textContent = '♥';
                favBtn.style.color = '#ef4444';
            } else {
                favoriteSongs.splice(idx, 1);
                favBtn.textContent = '♡';
                favBtn.style.color = '#fff';
            }
            localStorage.setItem('favorites', JSON.stringify(favoriteSongs));
        });

        // 更新收藏按钮状态
        function updateFavBtn() {
            if (!currentSong) return;
            const isFav = favoriteSongs.some(s => s.id === currentSong.id);
            favBtn.textContent = isFav ? '♥' : '♡';
            favBtn.style.color = isFav ? '#ef4444' : '#fff';
        }

        // 解析歌词
        function parseLyric(lrc) {
            if (!lrc) return [];
            const lines = lrc.split('\n');
            const lyricList = [];
            lines.forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 1000;
                    lyricList.push({ time, text: match[4] });
                }
            });
            return lyricList;
        }

        // 加载歌词
        async function loadLyric(id) {
            const res = await fetch(`${API_BASE}/lyric?id=${id}`);
            const data = await res.json();
            const lyricList = parseLyric(data.lrc?.lyric || '');
            lyricsContent.innerHTML = '';
            lyricList.forEach((line, i) => {
                const el = document.createElement('div');
                el.className = 'lyric-line';
                el.dataset.time = line.time;
                el.textContent = line.text || '...';
                lyricsContent.appendChild(el);
            });
        }

        // 高亮当前歌词
        function highlightLyric(currentTime) {
            const lines = document.querySelectorAll('.lyric-line');
            let activeLine = null;
            lines.forEach(line => {
                const time = parseFloat(line.dataset.time);
                if (time <= currentTime) {
                    line.classList.remove('active');
                    activeLine = line;
                }
            });
            if (activeLine) {
                activeLine.classList.add('active');
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 播放歌曲
        async function playSong(song) {
            currentSong = song;
            playerCover.src = song.al.picUrl;
            playerName.textContent = song.name;
            playerArtist.textContent = song.ar.map(a => a.name).join('/');
            updateFavBtn();

            // 获取播放地址
            const urlRes = await fetch(`${API_BASE}/song/url?id=${song.id}`);
            const urlData = await urlRes.json();
            if (urlData.data[0]?.url) {
                audio.src = urlData.data[0].url;
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                alert('无法获取歌曲播放地址');
            }

            // 加载歌词
            loadLyric(song.id);
        }

        // 切换歌曲
        function switchSong(direction) {
            if (!currentSongList.length) return;
            const currentIdx = currentSongList.findIndex(s => s.id === currentSong?.id);
            let nextIdx;
            if (playMode === 'random') {
                nextIdx = Math.floor(Math.random() * currentSongList.length);
            } else if (playMode === 'loop') {
                nextIdx = currentIdx;
            } else {
                nextIdx = (currentIdx + direction + currentSongList.length) % currentSongList.length;
            }
            playSong(currentSongList[nextIdx]);
        }

        // 播放/暂停
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        // 上/下一首
        prevBtn.addEventListener('click', () => switchSong(-1));
        nextBtn.addEventListener('click', () => switchSong(1));

        // 进度条更新
        audio.addEventListener('timeupdate', () => {
            progressSlider.value = (audio.currentTime / audio.duration) * 100 || 0;
            currentTimeEl.textContent = formatTime(audio.currentTime);
            highlightLyric(audio.currentTime);
        });

        // 加载完成
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        // 进度条拖动
        progressSlider.addEventListener('input', () => {
            const time = (progressSlider.value / 100) * audio.duration;
            audio.currentTime = time;
        });

        // 音量控制
        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value / 100;
        });

        // 播放结束
        audio.addEventListener('ended', () => {
            if (playMode === 'loop') {
                audio.currentTime = 0;
                audio.play();
            } else {
                switchSong(1);
            }
        });

        // 渲染歌曲列表
        function renderSongList(list, container) {
            container.innerHTML = '';
            if (!list.length) {
                container.innerHTML = '未找到相关歌曲';
                return;
            }
            list.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img class="song-cover" src="${song.al.picUrl}" alt="${song.name}">
                    <div class="song-name">${song.name}</div>
                    <div class="song-artist">${song.ar.map(a => a.name).join('/')}</div>
                `;
                card.addEventListener('click', () => {
                    currentSongList = list;
                    playSong(song);
                });
                container.appendChild(card);
            });
        }

        // 获取热门推荐
        async function renderRecommend() {
            const res = await fetch(`${API_BASE}/top/playlist/highquality?cat=华语&limit=10`);
            const data = await res.json();
            if (data.playlists?.length) {
                const playlistId = data.playlists[0].id;
                const songRes = await fetch(`${API_BASE}/playlist/detail?id=${playlistId}`);
                const songData = await songRes.json();
                renderSongList(songData.playlist?.tracks || [], recommendList);
            }
        }

        // 搜索歌曲
        async function searchSongs(keywords) {
            const res = await fetch(`${API_BASE}/search?keywords=${keywords}`);
            const data = await res.json();
            renderSongList(data.result?.songs || [], searchResult);
        }

        // 事件绑定
        searchBtn.addEventListener('click', () => searchSongs(searchInput.value));
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchSongs(searchInput.value);
        });
        refreshBtn.addEventListener('click', renderRecommend);

        // 初始化
        async function init() {
            await renderRecommend();
            audio.volume = volumeSlider.value / 100;
        }
        init();
    </script>
</body>
</html>

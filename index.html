<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>云音·乐</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 20% 30%, #0f121c, #03060c); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #eef4ff; padding-bottom: 90px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #fff, #8bb4ff); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .search-box { flex: 1; max-width: 360px; display: flex; background: rgba(255,255,255,0.08); border-radius: 60px; padding: 4px 4px 4px 18px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { flex: 1; background: transparent; border: none; color: #eef4ff; font-size: 0.9rem; outline: none; padding: 10px 0; }
        .search-box button { background: #3b6eff; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; }
        .section-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 18px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .rec-card { background: rgba(20,25,40,0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px 12px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.08); }
        .rec-card:hover { transform: translateY(-4px); background: rgba(30,36,52,0.8); }
        .rec-cover { width: 100%; aspect-ratio: 1; border-radius: 16px; background: #2a2f3a; background-size: cover; background-position: center; margin-bottom: 12px; }
        .rec-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rec-artist { font-size: 0.7rem; color: #9aaec5; }
        .results-list { margin-bottom: 30px; }
        .result-item { background: rgba(20,25,40,0.5); backdrop-filter: blur(8px); border-radius: 20px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .result-item:hover { background: rgba(59,110,255,0.2); }
        .result-cover { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
        .result-info { flex: 1; }
        .result-name { font-weight: 500; }
        .result-artist { font-size: 0.75rem; color: #9aaec5; }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,12,18,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; z-index: 1000; }
        .player-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }
        .player-cover { width: 56px; height: 56px; border-radius: 14px; background: #2a2f3a; background-size: cover; background-position: center; }
        .player-info { min-width: 160px; }
        .player-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 0.7rem; color: #9aaec5; }
        .player-controls { display: flex; align-items: center; gap: 20px; }
        .ctrl-icon { background: transparent; border: none; color: #eef4ff; font-size: 1.4rem; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .ctrl-icon:hover { background: rgba(255,255,255,0.1); }
        .play-pause { background: #3b6eff; width: 52px; height: 52px; font-size: 1.6rem; }
        .progress-area { flex: 2; min-width: 180px; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; }
        .progress-fill { width: 0%; height: 100%; background: #3b6eff; border-radius: 4px; }
        .time-wrap { display: flex; justify-content: space-between; font-size: 0.7rem; color: #8a99b0; }
        .volume-wrap { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 80px; cursor: pointer; }
        @media (max-width: 700px) { .player-inner { flex-wrap: wrap; justify-content: center; } .progress-area { width: 100%; order: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b6eff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🎵 云音·乐</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索歌曲、艺术家...">
            <button id="searchBtn">搜索</button>
        </div>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <div class="section-title">🔥 热门推荐</div>
        <span id="refreshRecommend" style="font-size:0.75rem; cursor:pointer;">换一批 ↻</span>
    </div>
    <div class="card-grid" id="recommendGrid">加载中...</div>
    <div id="searchResults" style="display: none;">
        <div class="section-title">📄 搜索结果</div>
        <div id="resultsList" class="results-list"></div>
    </div>
</div>

<div class="player-bar">
    <div class="player-inner">
        <div class="player-cover" id="playerCover"></div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">未播放</div>
            <div class="player-artist" id="playerArtist">-</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-icon" id="prevBtn">⏮</button>
            <button class="ctrl-icon play-pause" id="playBtn">▶</button>
            <button class="ctrl-icon" id="nextBtn">⏭</button>
        </div>
        <div class="progress-area">
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="time-wrap"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
        </div>
        <div class="volume-wrap">
            <span>🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // ========== 稳定公开API配置 ==========
    const API = "https://api.injahow.cn/meting/";

    // ========== 全局变量 ==========
    let currentPlaylist = [];
    let currentIndex = 0;
    const audio = document.getElementById('audio');

    // DOM
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const playerCover = document.getElementById('playerCover');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResultsDiv = document.getElementById('searchResults');
    const resultsList = document.getElementById('resultsList');
    const recommendGrid = document.getElementById('recommendGrid');
    const refreshRecommendBtn = document.getElementById('refreshRecommend');

    // 工具
    function formatTime(sec) {
        if (isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ========== 核心：获取推荐歌单 ==========
    async function getRecommend() {
        try {
            const r = await fetch(`${API}?server=netease&type=playlist&id=2438439785`);
            const data = await r.json();
            return data.map(i => ({
                id: i.id,
                name: i.name,
                artist: i.artist,
                cover: i.pic,
                url: i.url
            }));
        } catch (e) {
            return [];
        }
    }

    // ========== 搜索 ==========
    async function search(key) {
        try {
            const r = await fetch(`${API}?server=netease&type=search&count=20&keywords=${encodeURIComponent(key)}`);
            const data = await r.json();
            return data.map(i => ({
                id: i.id,
                name: i.name,
                artist: i.artist,
                cover: i.pic,
                url: i.url
            }));
        } catch (e) {
            return [];
        }
    }

    // ========== 渲染推荐 ==========
    async function renderRecommend() {
        recommendGrid.innerHTML = "加载中...";
        const list = await getRecommend();
        currentPlaylist = list;
        if (!list.length) {
            recommendGrid.innerHTML = "<div>加载失败</div>";
            return;
        }
        recommendGrid.innerHTML = "";
        list.forEach((song, idx) => {
            const c = document.createElement("div");
            c.className = "rec-card";
            c.innerHTML = `
                <div class="rec-cover" style="background-image:url('${song.cover}')"></div>
                <div class="rec-title">${escapeHtml(song.name)}</div>
                <div class="rec-artist">${escapeHtml(song.artist)}</div>
            `;
            c.onclick = () => {
                currentIndex = idx;
                play();
            };
            recommendGrid.appendChild(c);
        });
    }

    // ========== 播放 ==========
    function play() {
        if (!currentPlaylist.length) return;
        const song = currentPlaylist[currentIndex];
        playerTitle.innerText = song.name;
        playerArtist.innerText = song.artist;
        playerCover.style.backgroundImage = `url(${song.cover})`;
        audio.src = song.url;
        audio.play();
    }
    function next() {
        currentIndex = (currentIndex + 1) % currentPlaylist.length;
        play();
    }
    function prev() {
        currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        play();
    }

    // ========== 搜索执行 ==========
    async function doSearch() {
        const k = searchInput.value.trim();
        if (!k) return;
        searchResultsDiv.style.display = "block";
        resultsList.innerHTML = "搜索中...";
        const list = await search(k);
        if (!list.length) {
            resultsList.innerHTML = "<div>无结果</div>";
            return;
        }
        currentPlaylist = list;
        resultsList.innerHTML = "";
        list.forEach((song, idx) => {
            const item = document.createElement("div");
            item.className = "result-item";
            item.innerHTML = `
                <img class="result-cover" src="${song.cover}">
                <div class="result-info">
                    <div class="result-name">${escapeHtml(song.name)}</div>
                    <div class="result-artist">${escapeHtml(song.artist)}</div>
                </div>
            `;
            item.onclick = () => {
                currentIndex = idx;
                play();
                searchResultsDiv.style.display = "none";
            };
            resultsList.appendChild(item);
        });
    }

    // ========== 进度条 ==========
    function updateProgress() {
        if (!audio.duration) return;
        progressFill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
        currentTimeSpan.innerText = formatTime(audio.currentTime);
        durationSpan.innerText = formatTime(audio.duration);
    }

    // ========== 事件 ==========
    function bind() {
        playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
        prevBtn.onclick = prev;
        nextBtn.onclick = next;
        audio.ontimeupdate = updateProgress;
        audio.onended = next;
        audio.onplay = () => playBtn.innerHTML = "⏸";
        audio.onpause = () => playBtn.innerHTML = "▶";
        progressBar.onclick = e => {
            const w = progressBar.clientWidth;
            audio.currentTime = (e.offsetX / w) * audio.duration;
        };
        volumeSlider.oninput = () => audio.volume = volumeSlider.value;
        searchBtn.onclick = doSearch;
        searchInput.onkeydown = e => e.key === "Enter" && doSearch();
        refreshRecommendBtn.onclick = renderRecommend;
    }

    // ========== 启动 ==========
    async function start() {
        bind();
        await renderRecommend();
        audio.volume = 0.7;
    }
    start();
</script>
</body>
</html>

<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1.0">
 <title>音乐工具</title>
 <style>
 *{margin:0;padding:0;box-sizing:border-box;}
 body{background:#f5f7fa;padding:20px;}
 .box{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;}
 h2{text-align:center;margin-bottom:20px;}
 .inp{display:flex;gap:10px;margin-bottom:15px;}
 input{flex:1;padding:12px;border:1px solid #eee;border-radius:8px;}
 button{padding:12px 18px;background:#2d81ff;color:#fff;border:none;border-radius:8px;}
 .list{border:1px solid #eee;border-radius:8px;max-height:280px;overflow:auto;}
 .item{padding:12px;border-bottom:1px solid #f5f5f5;cursor:pointer;}
 .item:active{background:#f0f7ff;}
 .lrc{margin-top:20px;padding:15px;background:#f9f9f9;border-radius:8px;white-space:pre-wrap;line-height:1.8;}
 </style>
 </head>
 <body>
 <div class="box">
   <h2>网易云简易工具</h2>
   <div class="inp">
     <input id="gid" placeholder="输入歌单ID" value="2161693544">
     <button onclick="loadGd()">加载歌单</button>
   </div>
   <div class="list" id="list"></div>
   <div class="lrc" id="lrc">点击上方歌曲查看歌词</div>
 </div>
 <script>
 const api = location.origin;
 // 加载歌单
 async function loadGd(){
   let id = document.getElementById('gid').value;
   let res = await fetch(api + '/playlist/detail?id=' + id);
   let data = await res.json();
   let html = '';
   data.playlist.tracks.forEach(v=>{
     html += `<div class="item" onclick="getInfo(${v.id})">${v.name} - ${v.ar[0].name}</div>`;
   })
   document.getElementById('list').innerHTML = html;
 }
 // 歌曲详情 + 歌词
 async function getInfo(sid){
   let info = await fetch(api + '/song/detail?id=' + sid).then(r=>r.json());
   let lrc = await fetch(api + '/lyric?id=' + sid).then(r=>r.json());
   let str = `歌名：${info.songs[0].name}
 歌手：${info.songs[0].ar[0].name}
 ${lrc.lrc?.lyric || '暂无歌词'}`;
   document.getElementById('lrc').innerText = str;
 }
 </script>
 </body>
 </html>
